# This workflow must be usable with third-party pull requests,
# and thus may not make use of any secrets.
#
# Security checklists:
# https://aquilax.ai/blog/github-actions-security-hardening
# https://www.wiz.io/blog/github-actions-security-guide

name: Test and build

on:
  workflow_dispatch: {}
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - "**.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

jobs:
  test-terraform:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.5.7"

      - name: Install eclint
        run: npm install -g eclint
      - name: Check EditorConfig compliance
        run: eclint check $(git ls-files)

      - name: Initialize terraform/
        run: terraform init -backend=false
        working-directory: terraform
      - name: Validate terraform/
        run: terraform validate
        working-directory: terraform
      - name: Check formatting of terraform/
        run: terraform fmt -check -diff -recursive
        working-directory: terraform

      - name: Initialize terraform-hisec/
        run: terraform init -backend=false
        working-directory: terraform-hisec
      - name: Validate terraform-hisec/
        run: terraform validate
        working-directory: terraform-hisec
      - name: Check formatting of terraform-hisec/
        run: terraform fmt -check -diff -recursive
        working-directory: terraform-hisec

  test-ansible:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Ansible
        run: sudo apt update && sudo apt install -y ansible
      - name: Check Ansible playbook syntax
        run: ansible-playbook -i hosts.ini --syntax-check main.yml
        working-directory: ansible

  audit-workflows:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

  test-apiserver:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITH: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: apiserver/Gemfile
          BUNDLE_PATH: apiserver/vendor/bundle
      - name: Check code formatting with Rufo
        run: bundle exec rufo --check .
        working-directory: apiserver

  detect-apiserver-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        name: Detect apiserver/ changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" || "$GITHUB_EVENT_NAME" == "pull_request_target" ]]; then
            base_sha="$GITHUB_PR_BASE_SHA"
            head_sha="$GITHUB_PR_HEAD_SHA"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            before_sha="$GITHUB_EVENT_BEFORE"
            head_sha="$GITHUB_SHA"
            if [[ "$before_sha" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$head_sha")"
            else
              changed_files="$(git diff --name-only "$before_sha" "$head_sha")"
            fi
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              changed_files="$(git diff --name-only HEAD^ HEAD)"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            fi
          fi

          if printf '%s\n' "$changed_files" | grep -q '^apiserver/'; then
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

  apiserver-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - detect-apiserver-changes
      - test-terraform
      - test-ansible
      - audit-workflows
      - test-apiserver
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      needs.detect-apiserver-changes.outputs.changed == 'true' &&
      (
        (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
        || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
      )
    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITH: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      # We don't use ruby/setup-ruby in this workflow because it produces gem binaries
      # that aren't compatible with the server, which install Ruby from distro repos.
      - name: Check that we're using system Ruby
        run: test "$(which ruby)" = /usr/bin/ruby

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apiserver/vendor/bundle
          key: ${{ runner.os }}-24.04-${{ runner.arch }}-gems-${{ hashFiles('apiserver/Gemfile.lock') }}

      - name: Install matching Bundler version
        run: sudo gem install bundler -v $(grep -A1 "BUNDLED WITH" Gemfile.lock | tail -n1) --no-document
        working-directory: apiserver

      - name: Install gem bundle
        run: bundle install
        working-directory: apiserver
        env:
          BUNDLE_DEPLOYMENT: "true"
          BUNDLE_JOBS: 4
          BUNDLE_RETRY: 3
          BUNDLE_CLEAN: "true"

      - name: Detect library dependencies
        run: bundle exec debendencies . -o dpkg-dependencies.txt --tee
        working-directory: apiserver

      - name: Create tarball
        run: >
          tar
          -c
          --use-compress-program 'zstd -T0'
          --sort name
          --owner root:0
          --group root:0
          --mtime '2024-01-01 00:00Z'
          --preserve-permissions
          --pax-option exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime
          -f apiserver-"$GITHUB_RUN_NUMBER"-$(lsb_release --id --short | tr '[:upper:]' '[:lower:]')-$(lsb_release --release --short)-$(dpkg --print-architecture).tar.zst
          -C apiserver
          .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apiserver
          path: "*.tar.zst"
          compression-level: 0
